{% load static %}
<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rompehielo</title>
  <link rel="stylesheet" href="{% static 'etapasJuego/css/base.css' %}">
  <link rel="stylesheet" href="{% static 'etapasJuego/css/components.css' %}">
  <link rel="stylesheet" href="{% static 'etapasJuego/css/theme_login_port.css' %}">
  <link rel="stylesheet" href="{% static 'etapasJuego/css/rompehielo.css' %}">
</head>
<body class="theme-login mission-ui rompehielo-page">

  <main
    class="ws-container rompehielo-shell"
    data-rompehielo-app
    data-bootstrap-url="{{ rompehielo_bootstrap_url }}"
  >
    <section class="roulette-screen">
      <div class="roulette-timer-stack">
        <section class="timer-panel" aria-label="Tiempo restante del rompehielo">
          <div class="timer-panel__header">
            <span class="timer-panel__label">Tiempo restante</span>
          </div>
          <div
            id="rompehielo-timer"
            class="timer-panel__value"
            aria-live="polite"
            aria-label="Tiempo restante"
            data-duration-seconds="{{ rompehielo_duration_seconds }}"
          >05:00</div>
        </section>
        <div class="roulette-pointer" aria-hidden="true"></div>
      </div>

      <article class="roulette-stage">
        <div class="roulette-wheel-shell">
          <div class="roulette-wheel" data-roulette-wheel>
            <svg class="roulette-wheel__vector" viewBox="0 0 100 100" aria-hidden="true" focusable="false">
              <defs>
                <radialGradient id="rouletteOuterRing" cx="34%" cy="28%" r="78%">
                  <stop offset="0%" stop-color="#ffe78e" />
                  <stop offset="48%" stop-color="#f7be08" />
                  <stop offset="100%" stop-color="#be8600" />
                </radialGradient>
              </defs>

              <circle cx="50" cy="50" r="47.5" fill="none" stroke="url(#rouletteOuterRing)" stroke-width="5" />
              <circle cx="50" cy="50" r="44.5" fill="none" stroke="rgba(255,255,255,0.96)" stroke-width="1.6" />

              <g class="roulette-wheel__dividers">
                <line x1="50" y1="50" x2="50" y2="4.9" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(45 50 50)" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(90 50 50)" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(135 50 50)" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(180 50 50)" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(225 50 50)" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(270 50 50)" />
                <line x1="50" y1="50" x2="50" y2="4.9" transform="rotate(315 50 50)" />
              </g>
            </svg>
            <div class="roulette-segments" data-roulette-segments aria-hidden="true"></div>
            <div class="roulette-glow" aria-hidden="true"></div>
            <div class="roulette-core">
              <button
                class="turn-button"
                type="button"
                data-turn-button
              >
                <span class="turn-button__icon" aria-hidden="true">↻</span>
                <span class="turn-button__text">¡Girar!</span>
              </button>
            </div>
          </div>
        </div>
      </article>
    </section>
  </main>

  <div class="question-overlay" data-question-overlay aria-hidden="true" hidden>
    <article class="question-sheet" role="dialog" aria-modal="true" aria-labelledby="question-title">
      <div class="question-sheet__glow" aria-hidden="true"></div>
      <span class="question-emoji" data-question-emoji aria-hidden="true">✨</span>
      <div class="question-sheet__body">
        <p class="question-badge">Responde a tus compañeros</p>
        <h2 id="question-title" class="question-sheet__title" data-current-question>
          Presiona “Girar” para mostrar la primera pregunta.
        </h2>
      </div>

      <div class="question-sheet__footer">
        <button class="question-sheet__action" type="button" data-pass-button>
          Siguiente compañero
        </button>
      </div>
    </article>
  </div>

  <div id="timeup-overlay" class="timeup-overlay" aria-hidden="true">
    <div class="timeup-card" role="dialog" aria-modal="true">
      <div class="timeup-glow"></div>
      <p class="timeup-chip">Tiempo agotado</p>
      <h2>Uff, lo siento. Es hora de avanzar</h2>
      <p class="timeup-text">Lleven esta energía al Paso 1: sopa de letras. Avancen cuando estén listos.</p>
      <a class="btn btn-primary" href="{% url 'etapa1' %}">Ir a la sopa de letras</a>
    </div>
  </div>

  <script src="{% static 'etapasJuego/js/timeup-overlay.js' %}"></script>
  <script src="{% static 'etapasJuego/js/rompehielo.js' %}"></script>
</body>
</html>
